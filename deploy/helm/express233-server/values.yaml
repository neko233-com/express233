replicaCount: 1

image:
  repository: ghcr.io/neko233-com/express233/express233-server
  pullPolicy: IfNotPresent
  tag: ""

service:
  type: ClusterIP
  port: 23380

ingress:
  enabled: false
  className: nginx
  hosts:
    - host: express233.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

persistence:
  enabled: true
  size: 10Gi
  storageClass: ""

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

env:
  EXPRESS233_DATA: /data

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5

readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 3

serviceMonitor:
  enabled: false
  interval: 30s
