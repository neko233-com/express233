version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
