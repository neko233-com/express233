name: Helm

on:
  push:
    branches: [main, master]
    paths:
      - "deploy/helm/**"
  pull_request:
    branches: [main, master]
    paths:
      - "deploy/helm/**"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v5
        with:
          version: v3.17.0

      - name: Helm lint
        run: helm lint deploy/helm/express233-server

      - name: Template render
        run: helm template test deploy/helm/express233-server --debug > /dev/null
